<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PhishGuard | History</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Inter', sans-serif; padding: 40px; }
        .history-card { background: #141414; border: 1px solid #222; border-radius: 12px; padding: 25px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; color: #555; padding-bottom: 15px; border-bottom: 1px solid #222; font-size: 0.8rem; }
        td { padding: 20px 0; border-bottom: 1px solid #1a1a1a; font-size: 0.9rem; }
        .threat-red { color: #ef4444; font-weight: bold; }
        .threat-green { color: #10b981; font-weight: bold; }
        .view-btn { color: #3b82f6; text-decoration: none; font-weight: bold; border: 1px solid #3b82f6; padding: 5px 10px; border-radius: 4px; font-size: 0.75rem; transition: 0.3s; }
        .view-btn:hover { background: #3b82f6; color: white; }
    </style>
</head>
<body>
    <h1>Analysis History</h1>
    <div class="history-card">
        <table>
            <thead>
                <tr>
                    <th>DATE</th>
                    <th>SUBJECT</th>
                    <th>THREAT SCORE</th>
                    <th>ACTION</th>
                </tr>
            </thead>
            <tbody>
                {% for index, item in history %}
                <tr>
                    <td style="color: #555;">{{ item.timestamp }}</td>
                    <td>
                        <strong>{{ item.subject }}</strong><br>
                        <span style="font-size: 0.7rem; color: #444;">{{ item.sender }}</span>
                    </td>
                    <td class="{% if item.score > 50 %}threat-red{% else %}threat-green{% endif %}">
                        {{ item.score }}/100
                    </td>
                    <td>
                        <a href="/report/{{ index }}" class="view-btn">VIEW REPORT</a>
                    </td>
                </tr>
                {% else %}
                <tr><td colspan="4" style="text-align: center; color: #555;">No records found.</td></tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    <br><a href="/" style="color: #555; text-decoration: none;">← Back to Dashboard</a>
</body>
</html>
