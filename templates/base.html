<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PhishGuard | AI Email Forensics</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #ffffff; margin: 0; }
        .sidebar { width: 260px; background-color: #080808; border-right: 1px solid #1a1a1a; height: 100vh; position: fixed; }
        .main-content { margin-left: 260px; min-height: 100vh; width: calc(100% - 260px); }
        .content-container { max-width: 1200px; margin: 0 auto; padding: 50px 40px; }
        .card { background-color: #0c0c0c; border: 1px solid #1f1f1f; border-radius: 12px; }
        .nav-link { color: #888; padding: 12px 30px; display: block; font-size: 15px; transition: 0.2s; border-left: 4px solid transparent; }
        .nav-link:hover, .nav-link.active { color: #3b82f6; background-color: #111; border-left: 4px solid #3b82f6; }
    </style>
</head>
<body class="flex">
    <div class="sidebar flex flex-col py-8">
        <div class="px-8 mb-10">
            <h1 class="text-2xl font-bold tracking-tighter text-blue-500">PhishGuard</h1>
            <p class="text-[11px] text-gray-500 uppercase tracking-widest font-bold">Forensics Lab</p>
        </div>
        <nav class="flex-1 space-y-1">
            <a href="/" class="nav-link">Dashboard</a>
            <a href="/analyze" class="nav-link">Analyze Email</a>
            <a href="/history" class="nav-link">History</a>
        </nav>
    </div>
    
    <main class="main-content">
        <div class="content-container">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
</html>
